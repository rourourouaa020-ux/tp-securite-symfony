<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Produit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2>Ajouter un nouveau produit</h2>

    <form th:action="@{/produits}" th:object="${produit}" method="post" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Nom du produit</label>
            <input type="text" th:field="*{nom}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Prix (DT)</label>
            <input type="number" step="0.01" th:field="*{prix}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantité</label>
            <input type="number" th:field="*{quantite}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Enregistrer le produit</button>
        <a href="/" class="btn btn-secondary">Annuler</a>
    </form>

</body>
</html>
